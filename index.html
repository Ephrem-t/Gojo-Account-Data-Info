<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Deletion Information</title>
  <style>
    body { background: #f4f6fa; font-family: Arial, sans-serif; margin: 0; }
    .container { max-width: 600px; margin: 60px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #0001; padding: 40px 32px; }
    h1 { color: #2d3e50; font-size: 2em; margin-bottom: 24px; }
    p { color: #333; font-size: 1.15em; line-height: 1.6; }
    .info { background: #eaf4fc; border-left: 4px solid #2196f3; padding: 18px 20px; border-radius: 4px; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Account & Data Deletion</h1>
    <div class="info">
      <p>
        Parents or guardians who wish to delete their account or associated student data should contact the school administrator using the in-app support chat (<b>Support Team</b>). The school will process the request and delete the data from the Gojo Parent app.
      </p>
    </div>
  </div>
</body>
</html>
